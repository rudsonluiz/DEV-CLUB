<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio FOR</title>
</head>

<body>
    <input placeholder="Digite o nome do contato ">
    <p></p>
    <button onclick="search()"> Procurar Contato</button>

</body>

<script>
    let p = document.querySelector('p');
    let input = document.querySelector('input');

    const contacts = [

        { name: 'Fulano', phone: '1199999999' },
        { name: 'Ciclano', phone: '1199999999' },
        { name: 'Beltrano', phone: '1199999999' },
        { name: 'Rudson', phone: '1199999999' },
        { name: 'Maria', phone: '1199999999' },
        { name: 'João', phone: '1199999999' },
        { name: 'José', phone: '1199999999' },
        { name: 'Ana', phone: '1199999999' },
        { name: 'Carla', phone: '1199999999' },
        { name: 'Pedro', phone: '1199999999' },
    ]

    function search() {



        for (let i = 0; i < contacts.length; i++) {

            //console.log(contacts[i])

            if (input.value.toLowerCase() === contacts[i].name.toLowerCase()) {
                p.innerHTML = `contato Encontrado name: ${contacts[i].name} phone: ${contacts[i].phone}`;

                break
            } else {
                p.innerHTML = 'Contato Não Encontrado, tente novamente ';
            }
        }

    }

</script>

</html>
