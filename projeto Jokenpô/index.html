<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>DevClub JokenPÔ</title>
</head>

<body>
    <div class="container">
        <h1>JokenPÔ</h1>

        <button class="restart-button" id="restart-button" onclick="restartGame()">Reiniciar Jogo</button>

        <div class="buttons">
            <button id="rock" onclick="playhuman('rock')">&#128074</button>
            <button id="paper" onclick="playhuman('paper')">&#128400</button>
            <button id="scissors" onclick="playhuman('scissors')">&#128406</button>
        </div>

        <p class="result"></p>


        <p class="may-score">Minha Pontuação: <span id="human-score">0</span> </p>
        <p class="computer-score">Pontuação da Alexa: <span id="computer-score">0</span> </p>
        <P class="rounds-draws"> Deu Empate: <span id="rounds-draws">0</span> </P>

    </div>

    <script src="script.js"></script>

</body>

</html>
